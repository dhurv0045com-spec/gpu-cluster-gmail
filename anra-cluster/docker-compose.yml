version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DB_PATH=/data/cluster.db
      - GOOGLE_CLIENT_SECRETS=/app/client_secret.json
      - REDIRECT_URI=http://localhost:8000/api/auth/callback
    volumes:
      - ./backend:/app/backend
      - cluster-data:/data

volumes:
  cluster-data:
